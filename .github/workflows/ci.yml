name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

      # En dernier : le lint peut remonter du bruit préexistant sur du code jamais
      # linté avant cette CI — le build et les tests restent le signal prioritaire.
      - run: npm run lint
